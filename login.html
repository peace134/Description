<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>卡牌大师 · 登录</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== 粒子背景 ===== -->
    <canvas id="particlesCanvas"></canvas>

    <!-- ===== 光晕装饰 ===== -->
    <div class="glow-orb glow-orb--1"></div>
    <div class="glow-orb glow-orb--2"></div>
    <div class="glow-orb glow-orb--3"></div>

    <!-- ===== 登录卡片 ===== -->
    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Brand -->
            <div class="brand">
                <span class="brand-icon">🃏</span>
                <h1>卡牌大师</h1>
                <p>AI 智能识别 · 一秒洞悉</p>
            </div>

            <!-- 消息 -->
            <div class="msg msg--error" id="errorMsg">
                <span class="msg-icon">⚡</span>
                <span id="errorText">用户名或密码错误</span>
            </div>
            <div class="msg msg--success" id="successMsg">
                <span class="msg-icon">✅</span>
                <span id="successText">登录成功，正在跳转…</span>
            </div>

            <!-- 表单 -->
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label>
                        <span class="label-icon">👤</span> 用户名
                    </label>
                    <div class="input-wrap">
                        <input type="text" id="username" placeholder="请输入用户名" required />
                        <span class="input-glow"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <span class="label-icon">🔒</span> 密码
                    </label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="请输入密码" required />
                        <button type="button" class="toggle-pwd" aria-label="显示密码">👁️</button>
                        <span class="input-glow"></span>
                    </div>
                </div>

                <button type="submit" class="btn btn-gold" id="loginBtn">
                    <span class="btn-content">
                        <span class="btn-text">🚀 立即登录</span>
                        <span class="spinner"></span>
                    </span>
                </button>
            </form>

            <!-- 底部 -->
            <div class="auth-footer">
                <a href="register.html">
                    🪪 创建新账户
                    <span class="arrow">→</span>
                </a>
                <a href="#" style="color:rgba(255,255,255,0.12); pointer-events:none;">
                    🔑 忘记密码？
                </a>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

    <!-- ===== 登录专用逻辑 ===== -->
    <script>
        (function() {
            // 如果已登录直接跳转
            if (localStorage.getItem('isLogin') === 'true') {
                window.location.href = 'index.html';
                return;
            }

            const form = document.getElementById('loginForm');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const successMsg = document.getElementById('successMsg');
            const successText = document.getElementById('successText');
            const loginBtn = document.getElementById('loginBtn');

            function hideAllMessages() {
                errorMsg.classList.remove('show');
                successMsg.classList.remove('show');
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                hideAllMessages();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();

                // 校验
                if (!username || !password) {
                    errorText.textContent = '用户名和密码都不能为空';
                    errorMsg.classList.add('show');
                    shakeElement(errorMsg);
                    return;
                }

                // 读取用户
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const found = users.find(u => u.username === username && u.password === password);

                // 加载状态
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;

                setTimeout(() => {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;

                    if (found) {
                        localStorage.setItem('isLogin', 'true');
                        localStorage.setItem('currentUser', username);
                        successText.textContent = '🎉 欢迎回来，' + username + '！';
                        successMsg.classList.add('show');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1200);
                    } else {
                        errorText.textContent = '用户名或密码错误，请重新输入';
                        errorMsg.classList.add('show');
                        shakeElement(errorMsg);
                        document.getElementById('password').value = '';
                        document.getElementById('password').focus();
                    }
                }, 800);
            });

            function shakeElement(el) {
                el.style.animation = 'none';
                void el.offsetHeight;
                el.style.animation = 'shake 0.4s ease';
            }

            // 注入 shake 动画
            const styleShake = document.createElement('style');
            styleShake.textContent = `
                        @keyframes shake {
                            0%, 100% { transform: translateX(0); }
                            20% { transform: translateX(-10px); }
                            40% { transform: translateX(10px); }
                            60% { transform: translateX(-6px); }
                            80% { transform: translateX(6px); }
                        }
                    `;
            document.head.appendChild(styleShake);
        })();
    </script>

</body>
</html>
